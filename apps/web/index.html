<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="Share a link, stream locations live, and meet in the middle" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MeetHalf" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph (WhatsApp / Telegram / social link previews) -->
    <meta property="og:title" content="Meet Me Halfway" />
    <meta property="og:description" content="Share a link, stream locations live, and meet in the middle." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://meet-me-halfway-4ae79.web.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Meet Me Halfway" />
    <meta name="twitter:description" content="Share a link, stream locations live, and meet in the middle." />
    <meta name="twitter:image" content="/icons/og-card.png" />

    <!-- Favicon + Manifest -->
    <link rel="icon" type="image/svg+xml" href="/icons/midpoint-pin.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://api.mapbox.com" crossorigin />
    <link rel="preconnect" href="https://events.mapbox.com" crossorigin />

    <!-- Mapbox GL CSS — preloaded to avoid render-blocking -->
    <link
      rel="preload"
      href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript><link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" /></noscript>
    <title>Meet Me Halfway</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js");
        });
      }
    </script>
  </body>
</html>

target-version = "py312"
line-length = 99

[lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = [
    "B008",    # Depends() in FastAPI defaults is idiomatic
    "RUF001",  # Ambiguous unicode in i18n strings (Hebrew, Arabic)
    "RUF002",  # Ambiguous unicode in docstrings
    "RUF003",  # Ambiguous unicode in comments
]

[lint.per-file-ignores]
"tests/*" = ["S101", "E402"]  # allow assert + late imports in tests
"alembic/*" = ["INP001"]  # not a package

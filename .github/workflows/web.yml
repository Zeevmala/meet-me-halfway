name: Web CI

on:
  push:
    paths:
      - "apps/web/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "apps/web/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: npm audit
        working-directory: apps/web
        run: npm audit --audit-level=high --omit=dev
      - name: eslint
        working-directory: apps/web
        run: npx eslint src/ --max-warnings=0
      - name: prettier check
        working-directory: apps/web
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: tsc
        working-directory: apps/web
        run: npm run tsc

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: vitest
        working-directory: apps/web
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: vite build
        working-directory: apps/web
        run: npm run build
        env:
          CI: "true"
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_GOOGLE_PLACES_API_KEY: ${{ secrets.VITE_GOOGLE_PLACES_API_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

  lighthouse:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: apps/web/dist/
      - name: Lighthouse CI
        working-directory: apps/web
        run: npx @lhci/cli autorun

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium firefox
      - name: Build for E2E
        working-directory: apps/web
        run: npm run build
        env:
          VITE_MAPBOX_TOKEN: "pk.fake_for_e2e"
          VITE_FIREBASE_API_KEY: "fake-key"
          VITE_FIREBASE_AUTH_DOMAIN: "fake.firebaseapp.com"
          VITE_FIREBASE_DATABASE_URL: "https://fake-rtdb.firebaseio.com"
          VITE_FIREBASE_PROJECT_ID: "fake-project"
          VITE_RECAPTCHA_SITE_KEY: "fake-recaptcha"
      - name: Run E2E tests
        working-directory: apps/web
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  deploy:
    runs-on: ubuntu-latest
    needs: [build, lighthouse, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: apps/web/dist/
      - name: Strip sourcemaps from dist
        working-directory: apps/web
        run: rm -f dist/assets/*.js.map
      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project meet-me-halfway-4ae79
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

name: API CI

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "apps/api/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install ruff
      - name: ruff lint
        working-directory: apps/api
        run: ruff check .
      - name: ruff format
        working-directory: apps/api
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]" mypy
      - name: mypy --strict
        working-directory: apps/api
        run: python -m mypy --strict app/

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"
      - name: pytest
        working-directory: apps/api
        run: python -m pytest tests/ -v --tb=short

  load-test:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]" locust
      - name: Start API server
        working-directory: apps/api
        run: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        env:
          DATABASE_URL: "sqlite+aiosqlite://"
          FIREBASE_CREDENTIALS_JSON: ""
          GOOGLE_PLACES_KEY: ""
      - name: Wait for server
        run: sleep 3
      - name: Run Locust smoke test (30s)
        working-directory: apps/api
        run: python -m locust -f tests/load/locustfile.py --headless -u 10 -r 2 -t 30s --host http://localhost:8000

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t meet-me-halfway-api apps/api/

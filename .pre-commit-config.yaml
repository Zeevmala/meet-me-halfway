repos:
  # ── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: trailing-whitespace
      - id: end-of-file-fixer

  # ── Python: ruff (lint + format) ────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/api/.*\.py$
      - id: ruff-format
        files: ^apps/api/.*\.py$

  # ── Python: mypy --strict (requires mypy installed; CI enforces this) ────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        language: system
        entry: bash -c 'python -m mypy --strict apps/api/app/ || echo "mypy not installed — skipping (CI will enforce)"'
        types: [python]
        files: ^apps/api/app/.*\.py$
        pass_filenames: false

  # ── JavaScript/TypeScript: ESLint ────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: npx --prefix apps/web eslint --max-warnings=0
        files: ^apps/web/src/.*\.(ts|tsx)$
        pass_filenames: true

  # ── JavaScript/TypeScript/CSS/JSON: Prettier ─────────────────────────────────
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: npx --prefix apps/web prettier --write
        files: ^apps/web/src/.*\.(ts|tsx|css|json)$
        pass_filenames: true

repos:
  # ── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: trailing-whitespace
      - id: end-of-file-fixer

  # ── JavaScript/TypeScript: ESLint ────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: npx --prefix apps/web eslint --max-warnings=0
        files: ^apps/web/src/.*\.(ts|tsx)$
        pass_filenames: true

  # ── JavaScript/TypeScript/CSS/JSON: Prettier ─────────────────────────────────
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: npx --prefix apps/web prettier --write
        files: ^apps/web/src/.*\.(ts|tsx|css|json)$
        pass_filenames: true
